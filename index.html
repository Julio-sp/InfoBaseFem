<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAC Scout Portal v9.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --verde: #16a34a; --vermelho: #ef4444; --azul: #3b82f6; --bg: #f1f5f9;
            --ouro: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); 
        }
        body { margin:0; font-family: 'Lexend', sans-serif; background: var(--bg); color: #1e293b; }
        
        /* Layout */
        .top-bar { position: fixed; top: 0; width: 100%; height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1001; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: #0f172a; color: white; transition: 0.3s; z-index: 1000; padding-top: 70px; overflow-y: auto; }
        #sidebar.active { left: 0; }
        #sidebar a { display: block; padding: 15px 25px; color: #94a3b8; text-decoration: none; border-bottom: 1px solid #1e293b; cursor: pointer; font-size: 0.9rem; }
        .submenu { background: #161e2e; display: none; }
        .submenu.open { display: block; }
        .submenu a { padding-left: 45px !important; font-size: 0.8rem !important; }

        .container { padding: 20px; max-width: 800px; margin: 70px auto 20px auto; display: none; }
        .container.active { display: block; }

        /* Home Style */
        .hero-img { width: 100%; border-radius: 20px; margin: 20px 0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        /* Jogos */
        .game-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; border-left: 6px solid var(--azul); }
        .game-main { display: flex; align-items: center; justify-content: space-between; }
        .team-box { flex: 1; display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 0.85rem; }
        .score-box { width: 70px; text-align: center; font-size: 1.3rem; font-weight: 900; }
        .emblema-mini { width: 26px; height: 26px; object-fit: contain; }

        /* Treinos */
        .treino-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-mapa { background: var(--azul); color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        /* Tabelas e Info */
        .clickable-name { color: var(--azul); text-decoration: underline; cursor: pointer; font-weight: 600; }
        .tab-group { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .tab-btn { padding: 8px 12px; border: none; border-radius: 8px; background: white; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .tab-btn.active { background: var(--verde); color: white; }

        #detailPane { position: fixed; top:0; right:-100%; width:100%; height:100%; background:white; z-index:2000; transition: 0.4s; overflow-y: auto; }
        #detailPane.open { right:0; }
    </style>
</head>
<body>

<div class="top-bar">
    <div onclick="toggleMenu()" style="font-size:24px; cursor:pointer">☰</div>
    <img src="logo.png" style="height:40px" onclick="showView('home')">
    <div id="lock-btn" onclick="handleLogin()">🔒</div>
</div>

<div id="sidebar">
    <a onclick="showView('home')">🏠 INÍCIO</a>
    <a id="menu-artilharia" style="display:none" onclick="showView('artilharia')">⚽ ARTILHARIA</a>
    <a onclick="showView('jogos')">📅 CALENDÁRIO</a>
    <a onclick="toggleSub('sub-atletas')">👥 ATLETAS ▼</a>
    <div id="sub-atletas" class="submenu">
        <a onclick="showView('atletas', 'SUB16')">🔹 SUB16</a>
        <a onclick="showView('atletas', 'SUB18')">🔹 SUB18</a>
    </div>
    <a onclick="showView('treinos')">📍 ONDE TREINAMOS</a>
    <a onclick="toggleSub('sub-niver')">🎂 ANIVERSÁRIOS ▼</a>
    <div id="sub-niver" class="submenu"></div>
</div>

<!-- HOME -->
<div id="home" class="view container active" style="text-align: center;">
    <h1 style="font-weight: 800; margin-bottom: 0;">HONRA • RAÇA • PAIXÃO</h1>
    <p style="color:#64748b; margin-top: 5px;">ESTARREJA ANDEBOL CLUBE</p>
    <img src="equipa.jpg" class="hero-img" onerror="this.src='https://images.unsplash.com/photo-1504450758481-7338eba7524a?auto=format&fit=crop&q=80&w=800'">
    <div style="background: white; padding: 20px; border-radius: 15px; margin-top: 20px;">
        <h3 style="margin:0">Próximo Compromisso</h3>
        <p id="next-game-home" style="font-size: 0.9rem; color: #64748b;">A carregar calendário...</p>
    </div>
</div>

<!-- MAIN VIEW -->
<div id="mainView" class="container">
    <div id="filterArea" class="tab-group"></div>
    <div id="viewContent"></div>
</div>

<!-- TREINOS -->
<div id="viewTreinos" class="container">
    <h2>Horários de Treino</h2>
    <div class="treino-card">
        <div>
            <strong>Pavilhão Municipal</strong><br>
            <small>Segunda, Quarta e Sexta • 19:00 - 20:30</small>
        </div>
        <a href="https://maps.google.com" target="_blank" class="btn-mapa">VER LOCAL</a>
    </div>
</div>

<!-- DETALHES -->
<div id="detailPane">
    <div style="padding: 20px; font-weight: bold; cursor: pointer; background: #f8fafc;" onclick="closeDetail()"> ⬅ VOLTAR </div>
    <div id="detailBody"></div>
</div>

<script>
const LINKS = {
    atletas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqkp-Fv6iE5jweFA851ua8LXnMl53YQHgqU0-qnXq6rC5dfnGhIJMmZaVDN5Izc3Z5_JA15a1Iz2Lw/pub?gid=0&single=true&output=csv",
    jogos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqkp-Fv6iE5jweFA851ua8LXnMl53YQHgqU0-qnXq6rC5dfnGhIJMmZaVDN5Izc3Z5_JA15a1Iz2Lw/pub?gid=1340468570&single=true&output=csv",
    scout: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqkp-Fv6iE5jweFA851ua8LXnMl53YQHgqU0-qnXq6rC5dfnGhIJMmZaVDN5Izc3Z5_JA15a1Iz2Lw/pub?gid=1307801054&single=true&output=csv"
};

let DB = { atletas: [], jogos: [], scout: [] };
let isLogged = false;

const clean = (t) => t ? t.toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";
const getVal = (obj, key) => {
    const foundKey = Object.keys(obj).find(k => clean(k) === clean(key));
    return foundKey ? obj[foundKey] : "";
};

async function loadData() {
    try {
        const fetchCSV = async (url) => {
            const r = await fetch(url + "&t=" + Date.now());
            const text = await r.text();
            const lines = text.split('\n').filter(l => l.trim() !== "");
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ""));
            return lines.slice(1).map(line => {
                let obj = {};
                const vals = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                headers.forEach((h, i) => obj[h] = vals[i] ? vals[i].replace(/"/g, "").trim() : "");
                return obj;
            });
        };
        [DB.atletas, DB.jogos, DB.scout] = await Promise.all([fetchCSV(LINKS.atletas), fetchCSV(LINKS.jogos), fetchCSV(LINKS.scout)]);
        renderNiverMenu();
        updateNextGameHome();
    } catch (e) { console.error("Erro ao carregar dados."); }
}

function updateNextGameHome() {
    const proximos = DB.jogos.filter(j => isNaN(parseInt(getVal(j, 'gols_eac'))));
    if(proximos.length > 0) {
        const prox = proximos[0];
        document.getElementById('next-game-home').innerText = `${getVal(prox, 'escalão')} vs ${getVal(prox, 'adversário')} - ${getVal(prox, 'data')} às ${getVal(prox, 'hora')}`;
    }
}

function handleLogin() {
    const p = prompt("Senha Administrativa:");
    if(p === "eac2026") {
        isLogged = true;
        document.getElementById('menu-artilharia').style.display = 'block';
        document.getElementById('lock-btn').innerText = "🔓";
    }
}

function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
function toggleSub(id) { document.getElementById(id).classList.toggle('open'); }

function showView(view, param = '') {
    if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
    document.querySelectorAll('.view, .container').forEach(v => v.classList.remove('active'));
    document.getElementById('filterArea').innerHTML = "";
    
    if(view === 'home') { document.getElementById('home').classList.add('active'); }
    else if(view === 'treinos') { document.getElementById('viewTreinos').classList.add('active'); }
    else {
        document.getElementById('mainView').classList.add('active');
        if(view === 'jogos') {
            document.getElementById('filterArea').innerHTML = `<button class="tab-btn active" onclick="renderJogos('TODOS', this)">TODOS</button><button class="tab-btn" onclick="renderJogos('SUB16', this)">SUB16</button><button class="tab-btn" onclick="renderJogos('SUB18', this)">SUB18</button>`;
            renderJogos('TODOS');
        } else if(view === 'artilharia') {
            document.getElementById('filterArea').innerHTML = `<button class="tab-btn active" onclick="renderArt('SUB16', this)">SUB16</button><button class="tab-btn" onclick="renderArt('SUB18', this)">SUB18</button><button class="tab-btn" onclick="renderArt('GERAL', this)">GERAL</button>`;
            renderArt('SUB16');
        } else if(view === 'atletas') renderAtletas(param);
    }
}

function getStats(nome, esc = 'GERAL') {
    let sc = DB.scout.filter(s => clean(getVal(s, 'nome')) === clean(nome));
    if(esc !== 'GERAL') {
        const idsEsc = DB.jogos.filter(j => clean(getVal(j, 'escalão')) === clean(esc)).map(j => getVal(j, 'id'));
        sc = sc.filter(s => idsEsc.includes(getVal(s, 'jogo_id')));
    }
    return { g: sc.reduce((sum, s) => sum + (parseInt(getVal(s, 'golos')) || 0), 0), ex: sc.reduce((sum, s) => sum + (parseInt(getVal(s, 'exclusoes')) || 0), 0) };
}

function renderJogos(f, btn) {
    if(btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    let lista = (f === 'TODOS') ? DB.jogos : DB.jogos.filter(j => clean(getVal(j, 'escalão')) === clean(f));
    let html = "";
    lista.forEach(j => {
        const gEAC = parseInt(getVal(j, 'gols_eac'));
        const isF = getVal(j, 'local').toLowerCase().includes("fora");
        html += `<div class="game-card">
            <div class="game-main">
                <div class="team-box">${isF ? getVal(j, 'adversário') : 'EAC'}</div>
                <div class="score-box">${isNaN(gEAC) ? 'vs' : getVal(j, 'gols_eac')+'-'+getVal(j, 'gols_adv')}</div>
                <div class="team-box">${!isF ? getVal(j, 'adversário') : 'EAC'}</div>
            </div>
            ${!isNaN(gEAC) ? `<button class="tab-btn" style="width:100%;margin-top:10px" onclick="openJogo('${getVal(j, 'id')}')">VER DETALHES</button>` : ''}
        </div>`;
    });
    document.getElementById('viewContent').innerHTML = html || "<p>Sem jogos.</p>";
}

function renderArt(mode, btn) {
    if(btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    // Filtro único para não repetir jogadora na artilharia geral
    let nomesUnicos = [...new Set(DB.atletas.map(a => getVal(a, 'nome')))];
    let rank = nomesUnicos.map(nome => ({ nome, total: getStats(nome, mode).g }))
                .filter(a => a.total > 0).sort((a,b) => b.total - a.total);
    document.getElementById('viewContent').innerHTML = rank.map((p, idx) => `<div style="background:white; padding:12px; margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between"><span><b>${idx+1}º</b> ${p.nome}</span><b>${p.total} GOLOS</b></div>`).join('');
}

function renderAtletas(esc) {
    const list = DB.atletas.filter(a => clean(getVal(a, 'escalão')) === clean(esc));
    document.getElementById('viewContent').innerHTML = list.map(a => `<div style="background:white; padding:15px; margin-bottom:10px; border-radius:12px; display:flex; align-items:center" onclick="openAtleta('${getVal(a, 'nome')}', '${esc}')">
        <img src="fotos/${getVal(a, 'nome')}.jpg" style="width:45px; height:45px; border-radius:50%; margin-right:15px" onerror="this.src='logo.png'">
        <div><strong>${getVal(a, 'nome')}</strong><br><small>${getVal(a, 'posição')}</small></div>
    </div>`).join('');
}

function renderNiverMenu() {
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    document.getElementById('sub-niver').innerHTML = meses.map((m, i) => `<a onclick="showNiver(${i+1})">${m}</a>`).join('');
}

function showNiver(mes) {
    if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
    document.getElementById('mainView').classList.add('active');
    // REMOVER DUPLICADOS NAS ATLETAS (Isabella/Ariana)
    let nomesVistos = new Set();
    const nivers = DB.atletas.filter(a => {
        const m = parseInt(getVal(a, 'nascimento').split('/')[1]);
        const nome = getVal(a, 'nome');
        if(m === mes && !nomesVistos.has(nome)) {
            nomesVistos.add(nome);
            return true;
        }
        return false;
    }).sort((a,b) => parseInt(getVal(a, 'nascimento').split('/')[0]) - parseInt(getVal(b, 'nascimento').split('/')[0]));
    
    document.getElementById('viewContent').innerHTML = `<h3>Bolo de Aniversário 🎂</h3>` + nivers.map(n => `<div style="background:white; padding:15px; margin-bottom:8px; border-radius:12px; display:flex; justify-content:space-between"><span><strong>${getVal(n, 'nome')}</strong></span><b>Dia ${getVal(n, 'nascimento').split('/')[0]}</b></div>`).join('') || "Sem aniversários.";
}

function openAtleta(nome, esc) {
    const a = DB.atletas.find(x => clean(getVal(x, 'nome')) === clean(nome));
    const s = getStats(nome, esc);
    const nasc = getVal(a, 'nascimento').split('/');
    const idade = new Date().getFullYear() - nasc[2] - (new Date() < new Date(new Date().getFullYear(), nasc[1]-1, nasc[0]) ? 1 : 0);
    document.getElementById('detailBody').innerHTML = `<div style="padding:40px; text-align:center">
        <img src="fotos/${getVal(a, 'nome')}.jpg" style="width:120px; border-radius:50%" onerror="this.src='logo.png'">
        <h2>${getVal(a, 'nome')}</h2>
        <p>${getVal(a, 'posição')} | № ${getVal(a, 'número')}</p>
        <p>🎂 ${getVal(a, 'nascimento')} (${idade} anos)</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px">
            <div style="background:#f1f5f9; padding:20px; border-radius:15px">GOLOS<br><b style="font-size:2rem; color:var(--verde)">${s.g}</b></div>
            <div style="background:#f1f5f9; padding:20px; border-radius:15px">2 MIN<br><b style="font-size:2rem; color:var(--vermelho)">${s.ex}</b></div>
        </div>
    </div>`;
    document.getElementById('detailPane').classList.add('open');
}

function openJogo(id) {
    const sc = DB.scout.filter(s => getVal(s, 'jogo_id') == id);
    const j = DB.jogos.find(x => getVal(x, 'id') == id);
    document.getElementById('detailBody').innerHTML = `<div style="padding:20px">
        <h3>Golos da Partida (${getVal(j, 'escalão')})</h3>
        ${sc.map(s => `<p><span class="clickable-name" onclick="closeDetail(); openAtleta('${getVal(s, 'nome')}', '${getVal(j, 'escalão')}')">${getVal(s, 'nome')}</span>: ${getVal(s, 'golos')} golos</p>`).join('')}
    </div>`;
    document.getElementById('detailPane').classList.add('open');
}

function closeDetail() { document.getElementById('detailPane').classList.remove('open'); }
window.onload = loadData;
</script>
</body>
</html>
