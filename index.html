<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAC Scout Portal v7.0</title>
    <style>
        :root { 
            --verde: #16a34a; --vermelho: #ef4444; --azul: #3b82f6; --bg: #f1f5f9;
            --ouro: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); 
            --prata: linear-gradient(135deg, #71717a, #e4e4e7, #3f3f46); 
            --bronze: linear-gradient(135deg, #78350f, #f97316, #451a03);
        }
        body { margin:0; font-family: 'Lexend', sans-serif; background: var(--bg); color: #1e293b; }
        
        .menu-btn { position: fixed; top: 15px; left: 15px; font-size: 24px; cursor: pointer; z-index: 1001; background: white; padding: 5px 12px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: #0f172a; color: white; transition: 0.3s; z-index: 1000; padding-top: 60px; }
        #sidebar.active { left: 0; }
        #sidebar a { display: block; padding: 15px 25px; color: #94a3b8; text-decoration: none; border-bottom: 1px solid #1e293b; cursor: pointer; }

        .container { padding: 20px; max-width: 800px; margin: 65px auto 20px auto; display: none; }
        .container.active { display: block; }
        
        /* Estilo Artilharia EA Sports */
        .top3 { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin: 40px 0; min-height: 220px; }
        .card { width: 110px; height: 160px; clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 80%, 50% 100%, 0% 80%, 0% 10%); display: flex; flex-direction: column; align-items: center; position: relative; cursor: pointer; transition: 0.3s; }
        .card.rank-1 { background: var(--ouro); height: 190px; transform: scale(1.1); z-index: 2; }
        .card.rank-2 { background: var(--prata); color: #1e293b; }
        .card.rank-3 { background: var(--bronze); color: white; }
        .card-ovr { position: absolute; top: 12px; left: 12px; font-weight: 900; font-size: 1.4rem; }
        .card img { width: 75px; height: 75px; margin-top: 35px; object-fit: cover; border-radius: 5px; }
        .card-name { font-size: 0.7rem; font-weight: bold; margin-top: 10px; text-transform: uppercase; text-align:center; padding: 0 5px;}

        /* Agrupamento por Mês */
        .month-divider { background: #cbd5e1; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: #475569; margin: 25px 0 15px 0; display: inline-block; }

        .game-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid var(--azul); }
        .btn-info { width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 8px; background: #f1f5f9; color: #1e293b; font-weight: bold; cursor: pointer; }
        
        #detailPane { position: fixed; top:0; right:-100%; width:100%; height:100%; background:white; z-index:2000; transition: 0.4s; overflow-y: auto; }
        #detailPane.open { right:0; }
        .close-btn { padding: 20px; font-weight: bold; cursor: pointer; background: #f8fafc; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div id="sidebar">
    <a onclick="showView('home')">🏠 INÍCIO</a>
    <a onclick="showView('artilharia')">⚽ ARTILHARIA</a>
    <a onclick="showView('jogos')">📅 CALENDÁRIO</a>
    <a onclick="showView('atletas')">📋 ATLETAS (A-Z)</a>
</div>

<div id="home" class="view container active" style="text-align: center; padding-top: 100px;">
    <img src="logo.png" style="width:150px">
    <h1 style="margin-top:20px">EAC SCOUT</h1>
    <button onclick="showView('jogos')" style="padding:15px 40px; background:var(--verde); color:white; border:none; border-radius:30px; font-weight:bold; font-size:1.1rem; cursor:pointer">ENTRAR</button>
</div>

<div id="mainView" class="container">
    <div id="filterArea" class="tab-btn-group" style="text-align:center; margin-bottom:20px;"></div>
    <div id="viewContent"></div>
</div>

<div id="detailPane">
    <div class="close-btn" onclick="closeDetail()"> ⬅ VOLTAR PARA A LISTA </div>
    <div id="detailBody"></div>
</div>

<script>
const LINKS = {
    atletas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqkp-Fv6iE5jweFA851ua8LXnMl53YQHgqU0-qnXq6rC5dfnGhIJMmZaVDN5Izc3Z5_JA15a1Iz2Lw/pub?gid=0&single=true&output=csv",
    jogos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqkp-Fv6iE5jweFA851ua8LXnMl53YQHgqU0-qnXq6rC5dfnGhIJMmZaVDN5Izc3Z5_JA15a1Iz2Lw/pub?gid=1340468570&single=true&output=csv",
    scout: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqkp-Fv6iE5jweFA851ua8LXnMl53YQHgqU0-qnXq6rC5dfnGhIJMmZaVDN5Izc3Z5_JA15a1Iz2Lw/pub?gid=1307801054&single=true&output=csv"
};

let DB = { atletas: [], jogos: [], scout: [] };

// Limpeza de texto ultra-eficiente
const clean = (t) => t ? t.toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

async function loadData() {
    try {
        const fetchCSV = async (url) => {
            const r = await fetch(url + "&t=" + Date.now());
            const text = await r.text();
            const lines = text.split('\n').filter(l => l.trim() !== "");
            const headers = lines[0].toLowerCase().split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const vals = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let obj = {};
                headers.forEach((h, i) => obj[h] = vals[i] ? vals[i].replace(/"/g, "").trim() : "");
                return obj;
            });
        };
        [DB.atletas, DB.jogos, DB.scout] = await Promise.all([fetchCSV(LINKS.atletas), fetchCSV(LINKS.jogos), fetchCSV(LINKS.scout)]);
        console.log("Sistema EAC atualizado com sucesso.");
    } catch (e) { console.error("Erro ao carregar dados."); }
}

function showView(view) {
    if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
    document.querySelectorAll('.view, .container').forEach(v => v.classList.remove('active'));
    document.getElementById('mainView').classList.add('active');
    document.getElementById('filterArea').innerHTML = "";
    
    if(view === 'home') { document.getElementById('home').classList.add('active'); document.getElementById('mainView').classList.remove('active'); }
    else if(view === 'artilharia') {
        document.getElementById('filterArea').innerHTML = `
            <button class="tab-btn active" style="padding:10px 20px" onclick="renderArt('SUB16', this)">SUB16</button>
            <button class="tab-btn" style="padding:10px 20px" onclick="renderArt('SUB18', this)">SUB18</button>`;
        renderArt('SUB16');
    }
    else if(view === 'jogos') renderJogos();
    else if(view === 'atletas') renderAtletas();
}

function renderArt(esc, btn) {
    if(btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    
    // Lista de IDs de jogos do escalão
    const ids = DB.jogos.filter(j => clean(j.escalão) === clean(esc)).map(j => j.id);
    
    let rank = DB.atletas
        .filter(a => clean(a.escalão_base) === clean(esc))
        .map(a => {
            const gols = DB.scout
                .filter(s => clean(s.nome) === clean(a.nome) && ids.includes(s.jogo_id))
                .reduce((sum, s) => sum + (parseInt(s.golos || s.gols) || 0), 0);
            return { ...a, total: gols };
        })
        .filter(a => a.total > 0)
        .sort((a,b) => b.total - a.total);

    if(rank.length === 0) {
        document.getElementById('viewContent').innerHTML = "<p style='text-align:center; margin-top:50px;'>Sem golos registados para " + esc + "</p>";
        return;
    }

    let html = `<div class="top3">`;
    const pods = [rank[1], rank[0], rank[2]]; // Ordem visual: 2º, 1º, 3º
    pods.forEach((p, i) => {
        if(p) {
            const pos = p === rank[0] ? 1 : (p === rank[1] ? 2 : 3);
            html += `<div class="card rank-${pos}" onclick="openAtleta('${p.nome}')">
                <div class="card-ovr">${p.total}</div>
                <img src="fotos/${p.nome}.jpg" onerror="this.src='logo.png'">
                <div class="card-name">${p.nome}</div>
            </div>`;
        }
    });
    html += `</div>` + rank.map((p, idx) => `
        <div class="list-item" style="background:white; margin-bottom:5px; padding:15px; border-radius:10px; display:flex; justify-content:space-between;" onclick="openAtleta('${p.nome}')">
            <span><strong>${idx+1}º</strong> ${p.nome}</span>
            <span style="color:var(--verde); font-weight:bold">${p.total} Gols</span>
        </div>`).join('');
    document.getElementById('viewContent').innerHTML = html;
}

function renderJogos() {
    const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    let html = "";
    let ultimoMes = "";

    const sorted = [...DB.jogos].sort((a,b) => {
        const d1 = a.data.split('/'); const d2 = b.data.split('/');
        return new Date(d2[2], d2[1]-1, d2[0]) - new Date(d1[2], d1[1]-1, d1[0]);
    });

    sorted.forEach(j => {
        const mesAtual = meses[parseInt(j.data.split('/')[1]) - 1] + " " + j.data.split('/')[2];
        if(mesAtual !== ultimoMes) {
            html += `<div class="month-divider">${mesAtual}</div>`;
            ultimoMes = mesAtual;
        }

        const fut = !j.gols_eac;
        const isF = j.local && j.local.toLowerCase().includes("fora");
        let cor = fut ? "var(--azul)" : (parseInt(j.gols_eac) > parseInt(j.gols_adv) ? "var(--verde)" : "var(--vermelho)");

        html += `
        <div class="game-card" style="border-left-color:${cor}">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#666; margin-bottom:10px">
                <span>${j.data} às ${j.hora || '--:--'}</span>
                <a href="${j.link_maps}" target="_blank" style="color:var(--azul); text-decoration:none">📍 Google Maps</a>
            </div>
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.1rem">
                <span>${isF ? j.adversário : 'EAC'}</span>
                <span>${fut ? 'vs' : (isF ? j.gols_adv+' - '+j.gols_eac : j.gols_eac+' - '+j.gols_adv)}</span>
                <span>${isF ? 'EAC' : j.adversário}</span>
            </div>
            ${!fut ? `<button class="btn-info" onclick="openJogo('${j.id}')">+ INFORMAÇÕES DO JOGO</button>` : `<p style="text-align:center; color:var(--azul); font-size:0.8rem; margin-top:10px">📋 A convocação sai em breve</p>`}
        </div>`;
    });
    document.getElementById('viewContent').innerHTML = html;
}

function renderAtletas() {
    const sorted = [...DB.atletas].sort((a,b) => a.nome.localeCompare(b.nome));
    document.getElementById('viewContent').innerHTML = sorted.map(a => `
        <div class="list-item" style="background:white; padding:12px; margin-bottom:8px; border-radius:12px; display:flex; align-items:center; cursor:pointer" onclick="openAtleta('${a.nome}')">
            <img src="fotos/${a.nome}.jpg" style="width:45px; height:45px; border-radius:50%; object-fit:cover; margin-right:15px" onerror="this.src='logo.png'">
            <div><strong>${a.nome}</strong><br><small>${a.escalão_base} • Camisola ${a.número}</small></div>
        </div>`).join('');
}

function openAtleta(nome) {
    const a = DB.atletas.find(x => clean(x.nome) === clean(nome));
    const sc = DB.scout.filter(s => clean(s.nome) === clean(nome));
    const g = sc.reduce((sum, s) => sum + (parseInt(s.golos || s.gols) || 0), 0);
    const ex = sc.reduce((sum, s) => sum + (parseInt(s.exclusoes) || 0), 0);

    const nascimento = a.nascimento || "01/01/2000";
    const idade = new Date().getFullYear() - parseInt(nascimento.split('/')[2]);

    document.getElementById('detailBody').innerHTML = `
        <div style="padding:40px; text-align:center">
            <img src="fotos/${a.nome}.jpg" style="width:130px; height:130px; border-radius:50%; border:4px solid var(--verde); object-fit:cover" onerror="this.src='logo.png'">
            <h2>${a.nome}</h2>
            <p>Idade: <strong>${idade} anos</strong></p>
            <p>Camisola: <strong>${a.número}</strong> | Posição: ${a.posição || '--'}</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:25px">
                <div style="background:#f1f5f9; padding:20px; border-radius:15px">Golos<br><span style="font-size:1.8rem; color:var(--verde); font-weight:900">${g}</span></div>
                <div style="background:#f1f5f9; padding:20px; border-radius:15px">2 Minutos<br><span style="font-size:1.8rem; color:red; font-weight:900">${ex}</span></div>
            </div>
        </div>`;
    document.getElementById('detailPane').classList.add('open');
}

function openJogo(id) {
    const j = DB.jogos.find(x => x.id == id);
    let sc = DB.scout.filter(s => s.jogo_id == id);
    const totEac = parseInt(j.gols_eac) || 0;

    const lista = sc.map(s => {
        const at = DB.atletas.find(a => clean(a.nome) === clean(s.nome));
        return { 
            nome: at ? at.nome : s.nome, 
            num: at ? at.número : '?', 
            g: parseInt(s.golos || s.gols) || 0, 
            ex: s.exclusoes || 0,
            sm: s.sete_metros || 0
        };
    }).sort((a,b) => (parseInt(a.num)||0) - (parseInt(b.num)||0));

    document.getElementById('detailBody').innerHTML = `
        <div style="padding:20px">
            <div style="text-align:center; padding:20px; background:var(--bg); border-radius:15px; margin-bottom:20px">
                <h3>FICHA TÉCNICA</h3>
                <h2 style="margin:10px 0">${j.gols_eac} - ${j.gols_adv}</h2>
                <p>vs ${j.adversário}</p>
                <small>1ªP: ${j.res_1p} | 2ªP: ${j.res_2p}</small>
            </div>
            
            <table style="width:100%; border-collapse:collapse">
                <thead><tr style="font-size:0.75rem; color:#666; border-bottom:1px solid #eee">
                    <th style="padding:10px 5px">№</th><th>NOME</th><th>GOLOS</th><th>7M</th><th>2'</th>
                </tr></thead>
                <tbody>
                ${lista.map(l => `
                    <tr style="border-bottom:1px solid #f8fafc">
                        <td style="padding:12px 5px"><strong>${l.num}</strong></td>
                        <td style="font-weight:bold">${l.nome}</td>
                        <td style="color:var(--verde)">${l.g}</td>
                        <td>${l.sm}</td>
                        <td style="color:var(--vermelho)">${l.ex}</td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    document.getElementById('detailPane').classList.add('open');
}

function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
function closeDetail() { document.getElementById('detailPane').classList.remove('open'); }
window.onload = async () => { await loadData(); };
</script>
</body>
</html>
